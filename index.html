<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="GetDone — a calm, focused todo app."/><title>GetDone</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/><script defer="defer" src="main.js"></script></head><body><div class="app"><header class="navbar"><a class="navbar__brand" href="#" aria-label="GetDone home"><span class="logo-mark" aria-hidden="true"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6.5 4.5,9 10,3" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> </span><span class="navbar__title">GetDone</span> </a><button id="new-task-btn" class="btn btn--primary" type="button" aria-label="Create a new task"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> <span>New Task</span></button></header><div class="workspace"><aside class="sidebar" aria-label="Primary"><nav class="sidebar__section" aria-label="Smart views"><button class="nav-item" type="button" data-view="inbox"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2 4h10M2 7h7M2 10h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> <span class="nav-item__label">Inbox</span></button> <button class="nav-item" type="button" data-view="today"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 4.5V7l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> <span class="nav-item__label">Today</span></button> <button class="nav-item" type="button" data-view="week"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><rect x="2" y="3" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M2 6h10M5 1.5v3M9 1.5v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> <span class="nav-item__label">This Week</span></button></nav><div class="sidebar__divider" role="separator"></div><div class="sidebar__section"><div class="sidebar__heading"><span>Projects</span> <button id="new-project-btn" class="icon-btn" type="button" aria-label="Create a new project" title="New Project"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button></div><ul id="project-list" class="project-list" aria-label="Projects"></ul></div></aside><main class="main"><div id="project-header" class="project-header"></div><div class="col-headers" aria-hidden="true"><span></span> <span class="col-headers__label">Task</span> <span class="col-headers__label">Due</span> <span class="col-headers__label">Priority</span> <span></span></div><div id="todo-list" class="todo-list" aria-live="polite"></div></main></div></div><div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true"><div class="modal__panel"><header class="modal__header"><h2 id="modal-title" class="modal__title">New Task</h2><button type="button" class="icon-btn modal__close" data-modal-close aria-label="Close"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2.5 2.5l9 9M11.5 2.5l-9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button></header><form id="todo-form" class="modal__form" novalidate><div class="form-field"><label class="form-label" for="todo-title">Task title</label> <input id="todo-title" name="title" class="form-input" placeholder="What needs to get done?" autocomplete="off" required/></div><div class="form-field"><label class="form-label" for="todo-description">Description</label> <textarea id="todo-description" name="description" class="form-textarea" placeholder="Add any context, links, or details…" rows="2"></textarea></div><div class="form-row"><div class="form-field"><label class="form-label" for="todo-due-date">Due date</label> <input id="todo-due-date" name="dueDate" class="form-input" type="date"/></div><div class="form-field"><span class="form-label">Priority</span><div class="priority-group" role="radiogroup" aria-label="Priority"><label class="priority-opt priority-opt--high"><input type="radio" name="priority" value="high" class="priority-opt__input"/> <span class="priority-opt__dot" aria-hidden="true"></span> <span class="priority-opt__label">High</span></label> <label class="priority-opt priority-opt--medium"><input type="radio" name="priority" value="medium" class="priority-opt__input" checked="checked"/> <span class="priority-opt__dot" aria-hidden="true"></span> <span class="priority-opt__label">Medium</span></label> <label class="priority-opt priority-opt--low"><input type="radio" name="priority" value="low" class="priority-opt__input"/> <span class="priority-opt__dot" aria-hidden="true"></span> <span class="priority-opt__label">Low</span></label></div></div></div><div class="form-field"><label class="form-label" for="todo-notes">Notes</label> <textarea id="todo-notes" name="notes" class="form-textarea form-textarea--short" placeholder="Additional notes, blockers, references…" rows="2"></textarea></div><footer class="modal__footer"><button type="button" class="btn btn--ghost" data-modal-close>Cancel</button> <button type="submit" class="btn btn--primary"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><polyline points="1.5,6 4.5,9 10.5,3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg> <span data-submit-label>Save Task</span></button></footer></form></div></div><div id="project-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="project-modal-title" aria-hidden="true"><div class="modal__panel modal__panel--compact"><header class="modal__header"><h2 id="project-modal-title" class="modal__title">New Project</h2><button type="button" class="icon-btn modal__close" data-project-modal-close aria-label="Close"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M2.5 2.5l9 9M11.5 2.5l-9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button></header><form id="project-form" class="modal__form" novalidate><div class="form-field"><label class="form-label" for="project-name">Project name</label> <input id="project-name" name="name" class="form-input" placeholder="e.g. House renovations" autocomplete="off" maxlength="60" required/></div><footer class="modal__footer"><button type="button" class="btn btn--ghost" data-project-modal-close>Cancel</button> <button type="submit" class="btn btn--primary"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg> <span>Create Project</span></button></footer></form></div></div></body></html>
